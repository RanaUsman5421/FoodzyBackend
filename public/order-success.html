<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./CSS/Navbar.css">
    <link rel="stylesheet" href="./CSS/checkout.css">
    <title>Order Success - Foodzy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #f9f9f9;
            min-height: 100vh;
        }
        .success-container {
            max-width: 600px;
            margin: 80px auto;
            padding: 40px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
        }
        .success-icon {
            width: 100px;
            height: 100px;
            background: #f53e32;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
        }
        .success-icon i {
            font-size: 50px;
            color: white;
        }
        .success-title {
            font-size: 32px;
            color: #333;
            margin-bottom: 15px;
        }
        .success-message {
            font-size: 18px;
            color: #666;
            margin-bottom: 10px;
        }
        .order-number {
            font-size: 16px;
            color: #888;
            margin-bottom: 30px;
        }
        .order-details {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            text-align: left;
            margin-bottom: 30px;
        }
        .order-details h3 {
            margin-bottom: 15px;
            color: #333;
        }
        .order-details p {
            margin: 8px 0;
            color: #555;
        }
        .btn-container {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary {
            background: #f53e32;
            color: white;
        }
        .btn-secondary {
            background: #f53e32;
            color: white;
        }
    </style>
</head>

<body>
    <div id="navbar"></div>

    <div class="success-container">
        <div class="success-icon">
            <i class="fa-solid fa-check"></i>
        </div>
        <h1 class="success-title">Thank You!</h1>
        <p class="success-message">Your order has been received successfully.</p>
        <p class="order-number" id="orderNumber">Order ID: #</p>
        
        <div class="order-details">
            <h3>Order Summary</h3>
            <p><strong>Customer Name:</strong> <span id="customerName"></span></p>
            <p><strong>Delivery Address:</strong> <span id="deliveryAddress"></span></p>
            <p><strong>Number of Items:</strong> <span id="itemCount">0</span></p>
            <p><strong>Order Date:</strong> <span id="orderDate"></span></p>
        </div>

        <div class="btn-container">
            <a href="shop.html" class="btn btn-primary">Continue Shopping</a>
            <a href="index.html" class="btn btn-secondary">Go to Home</a>
        </div>
    </div>
    <footer></footer>
    <script src="./JS/Navbar.js"></script>
    <script src="./JS/order-success.js"></script>
</body>
</html>
