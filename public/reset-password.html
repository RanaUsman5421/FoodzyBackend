<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/CSS/Navbar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/CSS/login.css">
    <link rel="stylesheet" href="/CSS/animations.css">
    <title>Foodzy - Reset Password</title>
    <style>
        .reset-container {
            max-width: 450px;
            margin: 80px auto;
            padding: 40px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .reset-container h2 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-family: 'Poppins', sans-serif;
        }

        .reset-container p {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #f53e32;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #f53e32;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background: #e6352a;
        }

        .btn-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #f53e32;
            text-decoration: none;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .message {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .password-strength {
            margin-top: 5px;
            font-size: 12px;
        }

        .password-strength.weak {
            color: #dc3545;
        }

        .password-strength.medium {
            color: #ffc107;
        }

        .password-strength.strong {
            color: #28a745;
        }

        form {
            width: 100%;
            margin: 25px auto;
            padding: 20px;
            border: 1px solid #DEDEDE;
            border-radius: 5px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <div id="navbar"></div>

    <div class="reset-container">
        <h2>Reset Password</h2>
        <p>Enter the verification code sent to your email and create a new password.</p>

        <div id="message" class="message"></div>

        <form id="resetForm">
            <input type="hidden" id="email" name="email">

            <div class="form-group">
                <label for="code">Verification Code</label>
                <input type="text" id="code" name="code" placeholder="Enter 6-digit code" maxlength="6" required>
            </div>

            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" name="newPassword" placeholder="Enter new password" required>
                <div id="passwordStrength" class="password-strength"></div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm new password"
                    required>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">Reset Password</button>
        </form>

        <div class="back-link">
            <a href="/forgot-password">Request New Code</a> | <a href="/login">Back to Login</a>
        </div>
    </div>

    <footer></footer>

    <script src="/JS/Navbar.js"></script>
    <script>
        const resetForm = document.getElementById('resetForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const emailInput = document.getElementById('email');
        const newPasswordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const passwordStrengthDiv = document.getElementById('passwordStrength');

        // Get email from sessionStorage
        const storedEmail = sessionStorage.getItem('resetEmail');
        if (storedEmail) {
            emailInput.value = storedEmail;
        } else {
            // If no email, redirect to forgot password
            window.location.href = '/forgot-password';
        }

        // Password strength checker
        newPasswordInput.addEventListener('input', function () {
            const password = this.value;
            if (password.length === 0) {
                passwordStrengthDiv.textContent = '';
                passwordStrengthDiv.className = 'password-strength';
            } else if (password.length < 8) {
                passwordStrengthDiv.textContent = 'Password must be at least 8 characters';
                passwordStrengthDiv.className = 'password-strength weak';
            } else if (password.length < 12) {
                passwordStrengthDiv.textContent = 'Medium strength';
                passwordStrengthDiv.className = 'password-strength medium';
            } else {
                passwordStrengthDiv.textContent = 'Strong password';
                passwordStrengthDiv.className = 'password-strength strong';
            }
        });

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = emailInput.value;
            const code = document.getElementById('code').value.trim();
            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            // Validation
            if (!code) {
                showMessage('Please enter the verification code', 'error');
                return;
            }

            if (code.length !== 6) {
                showMessage('Verification code must be 6 digits', 'error');
                return;
            }

            if (!newPassword) {
                showMessage('Please enter a new password', 'error');
                return;
            }

            if (newPassword.length < 8) {
                showMessage('Password must be at least 8 characters', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Resetting...';
            messageDiv.className = 'message';
            messageDiv.style.display = 'none';

            try {
                const response = await fetch('/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        code: code,
                        newPassword: newPassword
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage(data.message, 'success');
                    // Clear session storage
                    sessionStorage.removeItem('resetEmail');
                    // Redirect to login after 2 seconds
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    showMessage(data.message, 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Reset Password';
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('An error occurred. Please try again.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
            }
        });

        function showMessage(msg, type) {
            messageDiv.textContent = msg;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
        }
    </script>
</body>

</html>
