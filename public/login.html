<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./CSS/login.css">
    <link rel="stylesheet" href="./CSS/Navbar.css">
    <link rel="stylesheet" href="./CSS/responsive.css">
    <link rel="stylesheet" href="./CSS/animations.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/brands.min.css"
        integrity="sha512-WxpJXPm/Is1a/dzEdhdaoajpgizHQimaLGL/QqUIAjIihlQqlPQb1V9vkgs9+VzXD7rgI6O+UsSKl4u5K36Ydw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Foodzy - Login</title>
</head>
<body>

    <div id="navbar"></div>

    <div class="red-line">
        <p>Login</p>
        <p>Home - Login</p>
    </div>

    <div class="login animate-fade-in">
        <form id="loginForm" class="animate-slide-up">
            <div class="login-logo">
                <img src="./Assets/login_logo.png" alt="">
            </div>

            <div class="login-form">
                <div class="login-form-div">
                    <p>Email Address*</p>
                    <input type="text" placeholder="Enter Your Email" name="email" id="email" required>
                </div>


                <div class="login-form-div">
                    <p>Password*</p>
                    <input type="password" placeholder="Enter Your Password" name="password" id="password" required>
                </div>
            </div>

            <div class="forget-text">
                <div class="remember-me">
                    <input type="checkbox"> <span>Remember Me</span>
                </div>
                <a href="#">Forgot Password?</a>
            </div>


            <div class="submit-btn">
                <button type="submit" class="animate-pulse">Login</button>
                <a href="/signup">SignUp?</a>
            </div>
        </form>
        <div id="errorMessage" style="display:none;color:red;text-align:center;margin-top:10px;"></div>
    </div>


    <footer></footer>

    <script src="./JS/Faq.js"></script>
    <script src="./JS/Navbar.js"></script>
    <script src="./JS/animations.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            errorMessage.style.display = 'none';
            errorMessage.textContent = '';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showError('Please enter both email and password');
                return;
            }

            try {
                const response = await fetch('/loginform', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const contentType = response.headers.get('content-type');
                
                if (contentType && contentType.includes('application/json')) {
                    const data = await response.json();
                    
                    if (data.success) {
                        window.location.href = '/shop.html';
                    } else {
                        showError(data.message || 'Login failed. Please check your credentials.');
                    }
                } else {
                    const text = await response.text();
                    if (text.includes('shop.html') || response.url.includes('shop.html')) {
                        window.location.href = '/shop.html';
                    } else {
                        showError(text || 'Login failed. Please check your credentials.');
                    }
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('An error occurred. Please try again.');
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }
    </script>
    
</body>
</html>
