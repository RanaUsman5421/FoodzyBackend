<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/CSS/Navbar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./CSS/Cart.css">
    <title>Foodzy - Cart</title>
</head>

<body>

    <div id="navbar"></div>

    <div class="red-line">
        <p>Cart</p>
        <p>Home - Cart</p>
    </div>


    <div class="cart">
        <div class="cart-headings">
            <div>Product</div>
            <div>Price</div>
            <div>Quantity</div>
            <div>Total</div>
            <div>Action</div>
        </div>

        <div class="cart-items">

        </div>
    </div>




    <footer></footer>



    <script src="./JS/Navbar.js"></script>
    <script>
        let cartState = []

        async function loadCart() {
            const res = await fetch('/cart');
            const data = await res.json();

            cartState = data;
            renderCart();
        }


        loadCart();

        let cart_items = document.querySelector('.cart-items');
        function renderCart() {
            cart_items.innerHTML = '';

            cartState.forEach(item => {
                const cart_item = document.createElement('div');
                cart_item.classList.add('cart-item');

                cart_item.innerHTML = `
      <div class="cart-img">
        <img src="${item.product.image}" />
        <span>${item.product.product_name}</span>
      </div>
      <div>${item.product.discount_price}</div>
      <div class="quantity">
        <i class="fa-solid fa-plus qty-btn" data-id="${item.product._id}" data-action="increase"></i>
        <p>${item.quantity}</p>
        <i class="fa-solid fa-minus qty-btn" data-id="${item.product._id}" data-action="decrease"></i>
      </div>
      <div>${Number(item.product.discount_price) * item.quantity}</div>
      <div class="trash-icon">
        <i class="fa-solid fa-trash-can remove-btn"
           data-id="${item.product._id}">
        </i>
      </div>
    `;

                cart_items.appendChild(cart_item);
            });
        }


        async function removeFromCart(productId) {
            try {
                const res = await fetch(`/removeFromCart/${productId}`, {
                    method: "DELETE"
                });

                const data = await res.json();

                cartState = data.cart;   // 🔥 update state
                renderCart();            // 🔥 re-render UI

            } catch (error) {
                console.error("Remove failed", error);
            }
        }


        // let btn = document.getElementsByClassName('remove-btn')[0];
        cart_items.addEventListener('click', (e) => {
            const removeBtn = e.target.closest('.remove-btn');
            if (!removeBtn) return;

            const productId = removeBtn.dataset.id;
            removeFromCart(productId);
        });

        cart_items.addEventListener('click', (e) => {
            const btn = e.target.closest('.qty-btn');
            if (!btn) return;

            const productId = btn.dataset.id;
            const action = btn.dataset.action;

            updateQuantity(productId, action);
        });


        async function updateQuantity(productId, action) {
            try {
                const res = await fetch('/cart/update', {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ productId, action })
                });

                const data = await res.json();

                cartState = data.cart;
                renderCart();
            } catch (err) {
                console.error('Quantity update failed', err);
            }
        }





    </script>
</body>

</html>
